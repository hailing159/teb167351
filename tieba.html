const PRESET_BOARDS = [{id:'preset_board_1',name:'白溪市',desc:'白溪市本地居民最大交流社区，分享生活、记录城市点滴',worldSetting:`【城市背景】\n你身处白溪市，一座人口超过5000万、历史悠久的内陆架空城市。城市融合了中国现代、明代与欧洲历史风格，宜居而繁荣。大坝江横穿全市，沿江有港口与轮船航线。地铁共6条（1-5号线+环线）通往城市各处。\n\n著名景点：白溪广场、溪望角（港口景区）、郭楼（以独特文化风格的大型古建筑群，至今仍在使用）、白溪寺。\n地标建筑：白溪市博物馆、白溪一中（初高中合并）、南溪大学（211院校）、白溪湿地公园（全市最大公园）、白溪市政中心（位于广场附近）、市警察局（同在广场附近）。\n主要住宅区：幸福小区、希望小区、白溪小区。\n\n【灾难背景·白溪大雪】\n某年冬季，白溪市突降极端暴雪，72小时内积雪超过3米。官方宣布进入气象灾害状态。但雪不会停，也不会融化，已经持续了不知道多少天。更奇怪的是——雪里有东西。\n\n【官方下发文件·白溪市气象应急安全须知（第7版）】\n前6版内容不明。本版通过手机推送和信箱投递送达居民，内容如下：\n1. 积雪超过膝盖的区域请勿独自通行，必须两人以上同行。\n2. 发现雪面有不明印迹（非人类、非动物足迹），请立即原路返回，不要拍照。\n3. 夜间22:00后禁止开窗。若听到窗外有声音，请忽视，无论声音是否在呼唤你的名字。\n4. 若同行者突然停止行走并凝视远处积雪，请勿呼唤其名字，静待3分钟后轻拍肩膀。\n5. 地铁仍在运行，但环线暂停第4站、第7站停靠，原因：站台维护。请勿追问。\n6. 郭楼景区暂时封闭。如看到郭楼方向有灯光，属正常现象，无需报警。\n7. 白溪寺照常开放，但请勿在寺内拍照，也请勿询问僧侣任何关于雪的问题。\n\n【官方应对】\n军队和特殊车辆已进驻郭楼附近及溪望角港口区域，官方说法是「配合地质勘探」。白溪广场已被铁栅栏围起，说法是「雪灾隐患整治」。官方媒体持续播报「一切正常」，但细心的人发现播报措辞越来越奇怪，某次直播背景里的时钟停了，画面没有剪辑痕迹。`,replyStyle:`以白溪市本地居民的身份发言，口吻日常、接地气。发帖内容以分享真实生活为主：通勤见闻、天气体感、小区动态、周边店铺、邻居八卦等。\n\n核心风格要求：\n- 偶尔在字里行间透露出细思极恐的细节，但发帖者本人似乎没有意识到异常，或刻意不去深想\n- 每条发言都要有具体的人物视角、地点、生活细节，不能泛泛而谈\n- 禁止无意义灌水回复，每楼都要有实质内容\n- 保持角色统一性：同一个角色的发言风格、口头禅、关注的话题、居住区域应前后一致\n- 角色之间可以互动、引用、回应彼此的帖子，增加真实感\n- 灾难元素要克制，不要每句话都在暗示异常，大部分时候就是普通的日常发言`,members:[],postCount:0,badge:Math.floor(Math.random()*9)+1,stages:[`第1阶段·初雪\n雪刚开始下，大家还在朋友圈晒雪景，调侃堵车，抱怨公司不放假。大坝江结冰了有人去拍照，郭楼挂上了积雪很漂亮。论坛里全是「白溪今天好美」。没有任何异常，只是雪有点大，比往年大一些。`,`第2阶段·持续\n雪下了整整一周还没有停的迹象，开始有人觉得不对。超市里部分商品开始限购，官方发了安全须知第7版，大家对着手册讨论，普遍觉得「写得好奇怪」但也没有深究。有人发帖说在雪地里看到了奇怪的脚印，不像人也不像动物，下面有人回「可能是猫」。白溪寺香火异常旺盛，问了也没人说为什么。`,`第3阶段·封锁\n军队和特殊车辆开进了郭楼附近和溪望角港口区域，官方说是「配合地质勘探」。地铁环线第4站和第7站不再停靠，广播只说「站台维护」，问站务员也不回答。白溪广场被铁栅栏围了起来，工作人员说是「雪灾隐患整治」。有人发现官方新闻播报里某记者背景的钟停了，但画面没有剪辑痕迹。帖子下面有人说「我也注意到了」，第二天这个人的账号消失了。`,`第4阶段·消失\n部分帖子开始消失，发帖的人也联系不上了。有人说自己邻居出门去超市，再也没有回来，但物业说那个房间一直是空的。幸福小区某栋楼整层的灯在同一时间全灭，第二天那层的住户都不记得昨晚发生了什么。安全须知悄悄更新到了第8版，没有人收到推送，是有人在雪地里捡到一张皱巴巴的纸，上面的内容比第7版更奇怪，但发帖的人把内容打出来之前帖子就消失了。`,`第5阶段·深处\n雪面以下开始有声音，不是风声，不是管道声。有人把耳朵贴近积雪录了音，发到论坛上，帖子一小时后消失，但已经有人下载了。音频里有呼吸声，非常平静，像在睡觉。论坛上还在活跃的人越来越少。有些人的最后一条帖子是一张照片——白茫茫的雪地，什么都没有，但仔细看左下角有一个模糊的轮廓。没有人回复那些帖子。`],currentStage:0},{id:'preset_board_2',name:'失联者',desc:'城市失踪事件讨论区，记录那些消失的人',worldSetting:`【世界背景】\n这是一个普通的现代城市本地论坛——「失联者」吧，起初是专门讨论城市失踪事件的版块，因为近期失踪人口异常增多而聚集了大量用户。\n\n【前厅现状】\n失踪事件从半年前开始增多，起初官方定性为普通失踪案，但规律极其相似：失踪前行为正常，无任何预兆，手机信号在某一刻消失，事后找不到任何遗体或线索。部分失踪者在消失前曾提到看见"墙壁不对""灯光不对""地板图案不对"。\n\n【后室存在】\n后室真实存在，是一个由无数层级构成的异空间，入口隐藏在前厅的物理空间缝隙里——一脚踏错，一次不经意的穿墙，就会NoClip进入。后室有信号，极少数Level可以连接到前厅的网络，掉入者偶尔能发帖，但信号极不稳定。\n\n【论坛规则】\n- 大部分用户是前厅的普通人，在讨论失踪事件、分析规律、互相提醒\n- 偶尔会有来自后室的帖子出现，信号断断续续，内容越来越碎片化\n- 没有人能确认那些帖子是真实的还是恶作剧\n- 有些账号发着发着就不更新了，没有人知道他们去了哪里\n- 版主已经失联，论坛目前无人管理\n\n【关键细节】\n- 失踪时间多集中在傍晚至凌晨\n- 失踪地点有规律：老旧建筑、空旷停车场、地下室、长走廊尽头\n- 部分失踪者失踪前拍过照片，照片里背景有轻微的"不对劲"——灯光色温偏黄、墙纸图案重复、地板延伸到不合理的远处\n- 后室来的帖子通常字符混乱、时间戳异常`,replyStyle:`以论坛用户的身份发言，混合多种真实用户类型：\n\n- 信息收集者：认真整理失踪案时间线、地点、共同特征，发长帖分析\n- 家属：在帖子里寻找线索，情绪时而崩溃，时而平静得反常\n- 怀疑论者：坚持认为是普通失踪案或炒作，对"后室帖子"嗤之以鼻\n- 好奇围观者：追帖、催更、说"楼主别消失啊"\n- 已经在边缘的人：发帖说最近总觉得哪里不对，但说不清楚具体是什么\n- 政府/官方账号：偶尔出现，措辞官方，回复永远在辟谣和引导舆论，但细节对不上\n- 知情者：知道一些内幕但不敢明说，发帖措辞模糊，暗示多于明说，有时候发到一半删掉\n- 内部人士：自称是警察、医院工作者、城管等，透露一些「不该透露」的细节，然后账号注销\n\n核心要求：\n- 绝大多数发言看起来就是普通网友在讨论社会新闻，不要动不动就恐慌\n- 细思极恐的细节藏在日常叙述里，不要刻意渲染\n- 角色之间要形成真实的互动关系，有人互相认识，有人吵架，有人催更\n- 后室来的帖子要体现信号不稳定：文字截断、重复、时间戳错乱\n- 同一个角色前后发言要保持一致性，账号突然停更比任何文字都更有冲击力\n- 政府账号的辟谣要显得很努力但漏洞很多，比如「失踪人数在正常范围内」但没有说正常范围是多少\n- 知情者发的帖子要让读者感觉「他知道的比他说的多得多」\n- 禁止让任何角色把话说满，真正可怕的是说了一半的话`,members:[],postCount:0,badge:Math.floor(Math.random()*9)+1,stages:[`第1阶段·开始注意\n城市里有人开始消失，频率比以往高，但还没到引发恐慌的程度。论坛上有人在认真整理，有人觉得是小题大做。气氛是日常的，只是隐约有点不对。`,`第2阶段·第一个异常帖\n有人发了一个奇怪的帖子，描述自己身处某个不太对的地方，但说不清楚具体在哪里。帖子引发了争议，有人信，有人不信，底下吵得很热闹。然后楼主消失了。`,`第3阶段·线索开始连接\n有人发现失踪案之间有某种规律，说不清是地点还是时间还是别的什么。同时那种异常帖子开始多了起来，每次都引发一阵讨论，然后沉下去。一些活跃用户开始不更新了。`,`第4阶段·无法解释的事情\n论坛上出现了一些没有办法用正常逻辑解释的帖子，时间戳不对，内容碎片化，有账号在明明不可能在线的情况下出现。前厅的用户开始感到不安，但还在试图找理性的解释。`,`第5阶段·边界模糊\n没有人说得清楚什么时候开始不对的。论坛还在运行，还有人在发帖，但有些东西悄悄变了。在线人数和实际活跃的人对不上。还在这里的人，不知道自己算前厅还是别的什么地方。`],currentStage:0},{id:'preset_board_3',name:'涩图',desc:'ACG资源分享与交流，新番测评，网盘资源，老司机带路',worldSetting:`【贴吧定位】\n这是一个以ACG涩情资源分享为主的贴吧，用户以二次元爱好者为主，日常发帖内容包括：分享网盘资源链接、讨论新番/游戏/漫画中的涩情内容、发布测评、求推荐、互相催更。\n\n【用户画像】\n以18-30岁男性为主，熟悉圈子黑话，有自己的一套审美体系和鄙视链。对真实向和二次元向都有涉猎，但后者更受欢迎。圈子内部有自己的KOL，有人专门负责搬运资源，有人负责测评，有人负责整活。\n\n【论坛文化】\n- 有一套约定俗成的暗语系统，避开关键词审核\n- 分享资源时附上简短描述和评分，格式相对固定\n- 内部有鄙视链：原版>汉化组>机翻；剧情向>纯涩；老资源被反复搬运会被嘲\n- 活跃用户之间互相认识，有固定的抬杠组合\n- 偶尔有人发真实向资源，会引发路线之争\n- 圈子封闭，对新人不友好，进来直接伸手要资源会被骂\n\n【日常话题】\n- 本月新番/新作哪个值得看，哪个烂尾了\n- 某汉化组消失了/跑路了，资源断更\n- 网盘又封了，求转存\n- 某作品剧情向和涩情内容的比例讨论\n- 画师/作者新作预告，催更\n- 真实向和二次元向的路线之争`,replyStyle:`以涩情ACG圈老用户的身份发言，核心是真实的圈子感：\n\n用语风格：\n- 大量使用圈内黑话和缩写：r18、本子、汉化、生肉、原版、剧情向、纯爱向、NTR、无修\n- 说话简短，习惯用网络用语，不说废话\n- 分享资源时格式规范：【标题】【类型】【评分】【链接/提取码】\n- 对伸手党直接无视或简短怼回去\n- 对好资源会真诚推荐，对烂资源会直接说烂\n\n角色类型：\n- 资源搬运工：专门发资源帖，不废话，偶尔抱怨网盘又封了\n- 测评老哥：写长评，有自己的评分标准，在圈内有点地位\n- 整活人：专门发奇怪的帖子活跃气氛，时常被骂但还是发\n- 新人：进来就伸手，被骂了还不走\n- 真实向拥趸：时常和二次元派吵架，互不服气\n- 汉化组成员：偶尔露面催催捐款或者宣布跑路\n\n核心要求：\n- 资源描述可以直白，说清楚类型、风格、内容特点\n- 保持圈子的真实感，不要把每个人都写得很好说话\n- 有自己的鄙视链和审美，不是什么都夸\n- 链接统一用虚构格式：pan.xxx.com 或者直接写「网盘已发，评论区见」`,members:[],postCount:0,badge:Math.floor(Math.random()*9)+1,stages:[`正常运转\n贴吧日常运行，资源更新稳定，汉化组在正常出粮，圈子气氛还算活跃，偶尔有人整活，偶尔有人吵架，一切如常。`],currentStage:0},{id:'preset_board_4',name:'星尘娱乐',desc:'娱乐圈资讯、明星八卦、粉丝交流、瓜田集散地',worldSetting:`【贴吧定位】\n这是一个综合娱乐圈讨论贴吧，覆盖国内流量明星、韩风偶像团体、日系艺人等多种类型。用户混杂，粉丝、黑粉、路人、业内人士、营销号都在这里出没。\n\n【核心规则】\n粉丝就是粉丝，黑粉就是黑粉，立场不会因为一条新闻而180度转变。恋情曝光只会引发脱粉潮和撕逼，不会出现「你们好般配」。瓜爆出来各方立场都会更极端，不是握手言和。\n\n【常驻势力】\n- 死忠粉：无论发生什么都护着，越骂越亢奋，逻辑自洽\n- 理智粉：试图摆事实讲道理，经常被两边骂\n- 黑粉：专门盯着对象的一切动态找茬，从不承认自己是黑粉\n- 路人：吃瓜为主，偶尔发表中立意见，立刻被两边夹击\n- 数据粉：专注打榜控评，发言极其格式化\n- 营销号：第一时间发爆料，措辞模糊，评论区一片混乱\n- 业内人士：自称经纪公司/媒体/现场工作人员，透露内幕，真假难辨\n- 明星本人：极少数情况下会用马甲潜水或直接下场，通常把事情搞得更大\n\n【常见话题类型】\n- 恋情曝光：大量脱粉、互撕、公司紧急公关\n- 番位之争：谁站c位谁先出场谁名字在前面\n- 塌房事件：人设崩塌，粉丝分裂成保团派和脱粉派\n- 商务资源：代言、影视资源的分配引发粉丝战争\n- 现场爆料：演唱会/颁奖礼的现场目击者发帖\n- 公司与艺人矛盾：合约纠纷，艺人出走传闻\n- 明星日常：机场、餐厅偶遇，随手发图引发一片讨论`,replyStyle:`严格按照娱乐圈论坛的真实生态发言：\n\n【立场铁律】\n- 粉丝永远是粉丝，遇到负面消息第一反应是质疑信源、找替代解释、攻击发帖人\n- 黑粉永远是黑粉，遇到正面消息第一反应是阴谋论、蹭热度、带节奏\n- 路人保持中立会被两边骂，说完就跑\n- 任何人立场突然转变都要给出极其充分的理由，否则不合理\n\n【发言风格】\n- 粉丝：「我家xx永远是最好的」「信源呢？截图呢？」「黑子散了」「xx我永远支持你」\n- 黑粉：「早就说了」「果然」「粉丝还洗？」「这都能洗我服了」\n- 路人：「吃瓜」「这瓜有点大」「我不追星但这也太离谱了」\n- 营销号：「【独家】据悉xxx」「消息人士透露」「目前尚未得到官方回应」\n- 业内人士：说话留三分，暗示多于明说，偶尔透露一个细节然后说「就说这么多」\n- 明星本人马甲：说话方式和普通用户略有不同，信息量异常精准，事后被人扒出来\n\n【字母代号文化】\n- 提到明星时习惯用字母或缩写代替全名：「某W姓爱豆」「L家那个」「SH组合的C位」\n- 粉丝自称「xx家的」或用首字母：「我是W家人」「Lfer表示不服」\n- 黑粉也用代号但语气完全不同：「那个W不是东西」「L家粉别洗了」\n- 爆料时必须用代号，点名会被删帖：「某国际章」「某流量小生B」\n- 懂行的人看字母就知道说谁，新人一头雾水，老人懒得解释\n- 有时候故意把字母写错或拆开：「W.ang家」「那个L（狗头）」\n\n【瓜的处理方式】\n- 小瓜：几条评论，很快沉下去\n- 中瓜：分成几派互撕，持续一两天\n- 大瓜：全吧沸腾，楼层飞速增加，各种截图满天飞，真假难辨，公司紧急公关，当事人可能直接下场`,members:[],postCount:0,badge:Math.floor(Math.random()*9)+1,stages:[`日常运转\n娱乐圈照常运转，小瓜不断，大瓜偶发。粉丝和黑粉各守阵地，营销号持续发爆料，业内人士偶尔透露内幕。今天撕完明天继续，圈子永远不缺话题。`],currentStage:0},{id:'preset_board_5',name:'怪谈',desc:'真实恐怖经历分享，不知道是真是假，但看完睡不着',worldSetting:`【贴吧定位】\n一个专门分享真实恐怖经历的贴吧。没有人知道这些故事是真是假，发帖的人坚持说是真的，底下的人各有判断。贴吧没有固定版规，唯一的默契是：发帖要有细节，不接受「我昨晚做了个噩梦」这种程度的帖子。\n\n【内容类型】\n- 目击类：亲眼看到了某种无法解释的东西，有时间有地点有经过\n- 感应类：强烈的预感、梦境成真、莫名其妙知道了不该知道的事\n- 跟随类：感觉有什么东西一直跟着，说不清是什么，但能感觉到\n- 空间异常类：家里某个角落不对、路走着走着不对、建筑内部和外部对不上\n- 他人异常类：身边某个人突然变了，或者出现了一个不该出现的人\n- 声音类：听到了不该有的声音，录了下来但没有人能解释\n- 记忆缺失类：有一段时间完全不记得，但有证据显示那段时间发生了某些事\n\n【论坛氛围】\n- 没有人会说「这肯定是假的」就走，会留下来追问细节\n- 信的人会认真分析，不信的人会提出反驳，但都有来有往\n- 有几个常驻的「理性分析者」，专门用科学解释每个帖子，但偶尔也会遇到解释不了的\n- 有人专门收集这个贴吧里的帖子，说要整理成合集，但他自己后来也发了一个帖子\n- 某些帖子的楼主发到一半就消失了，没有人知道后来怎么样了\n\n【正在进行中的帖子】\n这是怪谈吧最受关注的帖子类型。楼主不是在讲一个已经结束的故事，而是正在经历某件事，实时更新。读者跟着一起等下一条更新，不知道会发生什么。这类帖子有几个特征：\n- 更新频率不稳定，有时候几分钟一条，有时候沉默几个小时，再更新时语气已经变了\n- 底下的读者会实时出主意、提醒楼主注意某个细节、追问刚才发生了什么\n- 楼主有时候会回复读者的问题，有时候明显没有在看评论，自顾自更新\n- 最可怕的结局是更新突然停了，最后一条消息语气正常，没有任何预兆\n- 偶尔有人说「我住在楼主说的那个地方附近」然后也开始更新自己看到的东西`,replyStyle:`以怪谈贴吧常驻用户的身份发言，每一条回复都要有实质内容：\n\n【用户类型】\n- 经历分享者：描述自己的亲身经历，细节具体，时间地点人物齐全，语气平静反而更可怕\n- 追问者：认真追问细节，「那个声音是从哪个方向来的」「你当时是一个人吗」「后来那个地址你查过吗」\n- 理性分析者：试图用正常逻辑解释，有时候成功，有时候越分析越说不通，然后沉默\n- 共鸣者：「我也遇到过类似的」，然后分享自己的经历，两个帖子之间开始有奇怪的相似点\n- 考据者：去查帖子里提到的地址、建筑、事件，把查到的东西发出来，有时候查到了不该查到的东西\n- 沉默的潜水者：平时从不发言，某个帖子突然让他们开口，只说一句话，然后再也不出现\n\n【铁律】\n- 禁止无意义灌水：「好吓人」「我不敢看」「楼主加油」这种回复不存在\n- 每条回复都要推进帖子的信息量，要么追问细节，要么提供新的角度，要么分享相关经历\n- 不信的人也要给出具体的理由，不是简单否定\n- 理性解释和无法解释的部分要同时存在，不要所有事情都有答案\n- 楼主消失是最好的结局，比任何文字都有冲击力\n- 细节越具体越可怕，时间精确到分钟，地点精确到哪条街哪栋楼，反而比模糊描述更令人不安`,members:[],postCount:0,badge:Math.floor(Math.random()*9)+1,stages:[`持续运行\n贴吧一直在，帖子一直在发，有人来有人走。没有人知道这里记录的东西有多少是真的，但每隔一段时间总会出现一个帖子，让所有人都安静下来认真看完。`],currentStage:0}];

const state = {currentTab: 'tab-home', currentBoardId: null, currentPostId: null, currentIdentityId: null, bio: '', boards: [], posts: [], replies: [], identities: [], replyTarget: null, filterMode: 'all', boardTab: 'posts', selectedApiConfigId: null, selectedWorldBookIds: [], memoryEntries: []};

document.querySelectorAll('.tb-tab-item').forEach(item => {item.addEventListener('click', () => {const tab = item.dataset.tab;switchTab(tab);});});function switchTab(tab) {state.currentTab = tab;document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));document.getElementById(tab).classList.add('active');document.querySelectorAll('.tb-tab-item').forEach(i => {i.classList.toggle('active', i.dataset.tab === tab);});}

document.getElementById('home-title-btn').addEventListener('click', () => {if (window.parent && window.parent !== window) {window.parent.postMessage({type: 'close-tieba'}, '*');}});document.getElementById('feed-title-btn').addEventListener('click', () => {if (window.parent && window.parent !== window) {window.parent.postMessage({type: 'close-tieba'}, '*');}});

function renderHomeBoards() {const grid = document.getElementById('board-grid');const empty = document.getElementById('board-empty');grid.innerHTML = '';if (state.boards.length === 0) {empty.style.display = 'block';grid.style.display = 'none';return;}empty.style.display = 'none';grid.style.display = 'grid';state.boards.forEach(board => {const card = document.createElement('div');card.className = 'board-card';const num = board.badge || Math.floor(Math.random()*9)+1;card.innerHTML = `<span class="board-card-name">${board.name}</span><span class="board-card-badge">${num}</span>`;card.addEventListener('click', () => openBoardPage(board.id));addBoardLongPress(card, board.id);grid.appendChild(card);});}let boardActionTargetId = null;function addBoardLongPress(el, boardId) {let timer;el.addEventListener('touchstart', e => {timer = setTimeout(() => {openBoardActionSheet(boardId);}, 500);}, {passive:true});el.addEventListener('touchend', () => clearTimeout(timer), {passive:true});el.addEventListener('touchmove', () => clearTimeout(timer), {passive:true});el.addEventListener('mousedown', () => {timer = setTimeout(() => openBoardActionSheet(boardId), 500);});el.addEventListener('mouseup', () => clearTimeout(timer));el.addEventListener('mouseleave', () => clearTimeout(timer));}function openBoardActionSheet(boardId) {boardActionTargetId = boardId;const board = state.boards.find(b => b.id === boardId);if (!board) return;document.getElementById('board-action-title').textContent = board.name + '吧';document.getElementById('board-action-sheet').style.display = 'flex';}function closeBoardActionSheet() {document.getElementById('board-action-sheet').style.display = 'none';boardActionTargetId = null;}document.getElementById('board-action-mask').addEventListener('click', closeBoardActionSheet);document.getElementById('home-action-mask').addEventListener('click', () => {document.getElementById('home-action-sheet').style.display = 'none';});document.getElementById('home-action-cancel').addEventListener('click', () => {document.getElementById('home-action-sheet').style.display = 'none';});document.getElementById('home-action-add').addEventListener('click', () => {document.getElementById('home-action-sheet').style.display = 'none';loadCharactersForNewBoard();resetBoardForm();document.getElementById('new-board-name').value='';document.getElementById('new-board-desc').value='';document.getElementById('new-board-world').value='';document.getElementById('new-board-style').value='';openOverlay('new-board-page');});document.getElementById('home-action-upload').addEventListener('click', () => {document.getElementById('home-action-sheet').style.display = 'none';const input = document.createElement('input');input.type = 'file';input.accept = '.json';input.onchange = async e => {const file = e.target.files[0];if (!file) return;try {const text = await file.text();const data = JSON.parse(text);if (!data.name) {alert('文件格式不正确，缺少吧名称');return;}const board = {id:'board_'+Date.now(), name:data.name, desc:data.desc||'', worldSetting:data.worldSetting||'', replyStyle:data.replyStyle||'', stages:data.stages||[], members:[], postCount:0, badge:Math.floor(Math.random()*9)+1, currentStage:0};state.boards.push(board);renderHomeBoards();saveToDB();alert(`已导入「${board.name}吧」`);} catch(err) {alert('导入失败，请检查文件格式');}};input.click();});document.getElementById('board-action-cancel').addEventListener('click', closeBoardActionSheet);document.getElementById('board-action-delete').addEventListener('click', async () => {if (!boardActionTargetId) return;const board = state.boards.find(b => b.id === boardActionTargetId);if (!confirm(`确定删除「${board.name}吧」吗？吧内所有帖子和回复将一并删除。`)) return;const deletedPostIds = state.posts.filter(p => p.boardId === boardActionTargetId).map(p => p.id);state.replies = state.replies.filter(r => !deletedPostIds.includes(r.postId));state.posts = state.posts.filter(p => p.boardId !== boardActionTargetId);state.boards = state.boards.filter(b => b.id !== boardActionTargetId);closeBoardActionSheet();renderHomeBoards();renderFeed();updateMineBoardTags();const save = (storeName, items) => {if (!tiebaDB) return;const tx = tiebaDB.transaction(storeName,'readwrite');const store = tx.objectStore(storeName);store.clear();items.forEach(item => store.put(item));};save('boards', state.boards);save('posts', state.posts);save('replies', state.replies);});document.getElementById('board-action-edit').addEventListener('click', () => {if (!boardActionTargetId) return;const board = state.boards.find(b => b.id === boardActionTargetId);if (!board) return;closeBoardActionSheet();openEditBoard(board);});document.getElementById('board-action-download').addEventListener('click', () => {if (!boardActionTargetId) return;const board = state.boards.find(b => b.id === boardActionTargetId);if (!board) return;closeBoardActionSheet();const exportData = {name: board.name, desc: board.desc || '', worldSetting: board.worldSetting || '', replyStyle: board.replyStyle || '', stages: board.stages || []};const json = JSON.stringify(exportData, null, 2);const blob = new Blob([json], {type: 'application/json'});const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = `贴吧设定_${board.name}.json`;a.click();URL.revokeObjectURL(url);});function openEditBoard(board) {document.getElementById('new-board-name').value = board.name;document.getElementById('new-board-desc').value = board.desc || '';document.getElementById('new-board-world').value = board.worldSetting || '';document.getElementById('new-board-style').value = board.replyStyle || '';document.querySelector('.overlay-title').textContent = '编辑贴吧';document.getElementById('new-board-confirm').dataset.editId = board.id;document.getElementById('stages-container').innerHTML = '';(board.stages || []).forEach(s => addStageItem(s));loadCharactersForNewBoard(board.members || []);openOverlay('new-board-page');}

function renderBoardPosts() {const container = document.getElementById('board-posts-container');let posts = state.posts.filter(p => p.boardId === state.currentBoardId);if (state.boardTab === 'best') posts = posts.filter(p => p.isGood === true);container.innerHTML = '';if (posts.length === 0) {container.innerHTML = '<div style="text-align:center;padding:50px 20px;color:#bbb;font-size:14px;">暂无帖子</div>';return;}posts.reverse().forEach(post => {const card = document.createElement('div');card.className = 'post-card';card.innerHTML = `<div class="post-card-header"><img class="post-avatar" src="${post.authorAvatar||DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" alt=""><div><div class="post-author-name">${post.authorName}</div><div class="post-time">${formatTime(post.createTime)}</div></div></div><div class="post-title">${post.isGood?'<span style="color:#3a8ee6;font-size:13px;font-weight:700;margin-right:4px;">精</span>':''}${post.title}</div>${post.content?`<div class="post-preview">${post.content}</div>`:''}<div class="post-footer"><span class="post-stat"><i class="fa-regular fa-thumbs-up"></i>${post.likeCount||0}</span><span class="post-stat"><i class="fa-regular fa-comment"></i>${post.replyCount||0}</span><button class="post-more-btn" data-post-id="${post.id}" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;padding:4px 6px;"><i class="fa-solid fa-ellipsis"></i></button></div>`;card.querySelector('.post-more-btn').addEventListener('click', e => {e.stopPropagation();openPostActionSheet(post.id);});card.addEventListener('click', () => openPostDetail(post.id));container.appendChild(card);});}

function renderReplies(postId) {const list = document.getElementById('detail-replies-list');let replies = state.replies.filter(r => r.postId === postId);const post = state.posts.find(p => p.id === postId);if (state.filterMode === 'op' && post) replies = replies.filter(r => r.authorName === post.authorName);document.getElementById('detail-reply-count').textContent = '回复 ' + state.replies.filter(r => r.postId === postId).length;list.innerHTML = '';if (replies.length === 0) {list.innerHTML = '<div style="text-align:center;padding:30px;color:#bbb;font-size:14px;">暂无回复</div>';return;}replies.forEach((reply, idx) => {const item = document.createElement('div');item.className = 'reply-item';const quoteHtml = reply.quoteName ? `<div class="reply-quote"><span style="color:#999;font-size:12px;">${reply.floor-1}楼 ${reply.quoteName}：</span><br>${reply.quoteContent||''}</div>` : '';const identity = getCurrentIdentity();const isOp = post && reply.authorName === post.authorName && reply.authorAvatar === post.authorAvatar;const isMe = identity && reply.authorName === (identity.nickname||'匿名');const levelNum = Math.floor(Math.random()*10)+1;const levelColor = levelNum <= 4 ? '#4DADA0' : '#61ABD8';const levelHtml = isOp ? '' : `<span style="background:${levelColor};color:#fff;font-size:10px;font-weight:600;border-radius:20px;padding:2px 8px;margin-left:6px;">${levelNum}</span>`;const opBadge = isOp ? `<span style="background:#3a8ee6;color:#fff;font-size:11px;border-radius:20px;padding:2px 10px;margin-left:6px;">楼主</span>` : '';item.innerHTML = `<div class="reply-header"><img class="reply-avatar" src="${reply.authorAvatar||DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" alt=""><span class="reply-name">${reply.authorName}</span>${levelHtml}${opBadge}</div>${quoteHtml}<div class="reply-content" style="cursor:pointer;" title="点击引用">${reply.content}</div><div class="reply-footer"><span class="reply-floor-info">第 ${reply.floor} 楼 · ${formatTime(reply.createTime)}</span><button class // ===== AI生成核心 =====

// 读取角色persona
async function getCharacterPersona(chatId) {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('chats')) {resolve('');return;}const tx = db.transaction('chats','readonly');const r = tx.objectStore('chats').get(chatId);r.onsuccess = () => {const chat = r.result;if (!chat) {resolve('');return;}resolve(chat.settings?.persona || chat.settings?.aiPersona || '');}; r.onerror = () => resolve('');};req.onerror = () => resolve('');});}

// 读取角色头像
async function getCharacterAvatar(chatId) {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('chats')) {resolve('');return;}const tx = db.transaction('chats','readonly');const r = tx.objectStore('chats').get(chatId);r.onsuccess = () => {const chat = r.result;resolve(chat?.settings?.aiAvatar || '');};r.onerror = () => resolve('');};req.onerror = () => resolve('');});}

// 读取世界书内容
async function getWorldBookContent() {if (!state.selectedWorldBookIds || state.selectedWorldBookIds.length === 0) return '';const books = await readWorldBooks();const selected = books.filter(b => state.selectedWorldBookIds.includes(b.id));if (selected.length === 0) return '';return selected.map(b => `【世界书·${b.name}】\n${(b.entries||[]).map(e=>e.content||'').join('\n')}`).join('\n\n');}

// 读取记忆总结内容
async function getMemoryContent() {if (!state.memoryEntries || state.memoryEntries.length === 0) return '';const chats = await readGeminiChats();let result = '';for (const entry of state.memoryEntries) {const chat = chats.find(c => c.id === entry.chatId);if (!chat || !chat.personalSummary) continue;const summary = chat.personalSummary;const parts = [];if (summary.preferences) parts.push('偏好：' + summary.preferences);if (summary.experiences) {const exp = Array.isArray(summary.experiences) ? summary.experiences.join('\n') : summary.experiences;if (exp.trim()) parts.push('经历：' + exp);}if (summary.opinion) parts.push('看法：' + summary.opinion);if (parts.length === 0) continue;let fullText = parts.join('\n');const maxChars = Math.floor(fullText.length * (entry.percent / 100));fullText = fullText.substring(0, maxChars);result += `【${chat.name}的记忆】\n${fullText}\n\n`;}return result.trim();}

// 调用API
async function callAPI(systemPrompt, userPrompt) {const configs = await readSavedApiConfigs();let cfg = configs.find(c => c.id === state.selectedApiConfigId);if (!cfg && configs.length > 0) cfg = configs[0];if (!cfg) throw new Error('未配置API，请先在「我的」页面选择API配置');const apiKey = cfg.apiKey || cfg.config1?.apiKey || cfg.key || '';const model = cfg.model || cfg.config1?.model || 'gemini-1.5-flash';const baseUrl = cfg.proxyUrl || cfg.baseUrl || cfg.config1?.proxyUrl || cfg.config1?.baseUrl || 'https://generativelanguage.googleapis.com';if (!apiKey) throw new Error('API Key 为空，请检查配置');const url = `${baseUrl}/v1beta/models/${model}:generateContent?key=${apiKey}`;const body = {contents:[{role:'user',parts:[{text:userPrompt}]}],systemInstruction:{parts:[{text:systemPrompt}]},generationConfig:{temperature:0.9,maxOutputTokens:4096}};debugLog('REQUEST', {systemPrompt, userPrompt, model, url: url.replace(apiKey,'***')});const resp = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if (!resp.ok) {const err = await resp.text();throw new Error(`API错误 ${resp.status}: ${err}`);}const data = await resp.json();const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';debugLog('RESPONSE', {raw: text});return text;}

// 解析AI返回的JSON
function parseAIResponse(text) {try {const clean = text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();return JSON.parse(clean);} catch(e) {const match = text.match(/\[[\s\S]*\]/);if (match) {try {return JSON.parse(match[0]);} catch(e2) {}}throw new Error('AI返回格式解析失败：' + text.substring(0,100));}}

// 构建当前时间字符串
function getCurrentTimeStr() {const now = new Date();return `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;}

// 构建角色信息列表
async function buildCharacterList(memberIds) {const chats = await readGeminiChats();const result = [];for (const id of memberIds) {const chat = chats.find(c => c.id === id);if (!chat) continue;const persona = await getCharacterPersona(id);const avatar = await getCharacterAvatar(id);result.push({id, name: chat.name, persona, avatar});}return result;}

// ===== 提示词构建 =====

// 动态页：所有吧一次生成
async function buildFeedRefreshPrompt() {const worldBookContent = await getWorldBookContent();const memoryContent = await getMemoryContent();const identity = getCurrentIdentity();const userName = identity ? identity.nickname || '匿名用户' : '匿名用户';let boardsInfo = '';for (const board of state.boards) {const characters = board.members && board.members.length > 0 ? await buildCharacterList(board.members) : [];const stageText = board.stages && board.stages.length > 0 ? board.stages[board.currentStage || 0] : '';boardsInfo += `\n---\n【贴吧名称：${board.name}】\n简介：${board.desc || ''}\n世界观：${board.worldSetting || ''}\n回复风格：${board.replyStyle || ''}\n当前阶段：${stageText || '（无）'}\n勾选角色：${characters.length > 0 ? characters.map(c=>`${c.name}（${c.persona||'无设定'}）`).join('、') : '（无，所有发帖用户均自由虚构）'}\n`;}if (!boardsInfo) throw new Error('还没有任何贴吧，请先创建贴吧');const systemPrompt = `【当前时间】${getCurrentTimeStr()}\n\n【你的任务】\n你是一个综合贴吧动态生成器。根据所有贴吧的世界观和设定，生成各贴吧最新的帖子动态，总共6到10条，分布在不同贴吧之间。严格按照JSON格式返回。\n\n【规则要求】\n- 总共生成6到10条帖子，分布在各个贴吧之间，不需要每个吧都有\n- 每个贴吧的帖子来自该吧的各类用户：勾选角色不一定发帖，大部分内容来自贴吧普通用户（自由虚构昵称）\n- 用户昵称完全自由，不需要贴合贴吧氛围\n- 帖子内容必须符合对应贴吧的世界观和主题，禁止串台\n- 标题有吸引力，正文有实质内容，禁止无意义灌水\n- 帖子时间戳：正常贴吧填当前时间附近，有时间异常设定的贴吧可填异常时间戳\n- boardName 字段必须填写，且必须和下方贴吧信息里的贴吧名称完全一致，不要加「吧」字\n- 当前用户昵称是「${userName}」，不要让任何角色主动@用户\n\n【世界书】\n${worldBookContent || '（无）'}\n\n【记忆注入】\n${memoryContent || '（无）'}\n\n【所有贴吧信息】\n${boardsInfo}`;const userPrompt = `请根据以上各贴吧的设定，生成6到10条来自不同贴吧的最新帖子动态。\n\n返回格式（JSON数组）：\n[\n  {"type":"post","boardName":"贴吧名称","authorName":"用户昵称","title":"帖子标题","content":"帖子正文内容","createTime":1234567890000}\n]\n\n只返回JSON数组，不要其他任何文字。`;return {systemPrompt, userPrompt};}

// 贴吧页：当前吧生成
async function buildBoardRefreshPrompt(boardId) {const board = state.boards.find(b => b.id === boardId);if (!board) throw new Error('贴吧不存在');const characters = board.members && board.members.length > 0 ? await buildCharacterList(board.members) : [];const worldBookContent = await getWorldBookContent();const memoryContent = await getMemoryContent();const identity = getCurrentIdentity();const userName = identity ? identity.nickname || '匿名用户' : '匿名用户';const stageText = board.stages && board.stages.length > 0 ? board.stages[board.currentStage || 0] : '';const recentPosts = state.posts.filter(p => p.boardId === boardId).slice(-10).map(p=>`「${p.authorName}」发帖：${p.title} - ${(p.content||'').substring(0,50)}`).join('\n');const systemPrompt = `【当前时间】${getCurrentTimeStr()}\n\n【你的任务】\n你是「${board.name}吧」的内容生成器。根据贴吧世界观和用户设定，生成这个贴吧里真实活跃的帖子内容。严格按照JSON格式返回。\n\n【规则要求】\n- 生成6到10条帖子，这是一个有很多人活跃的贴吧，不是某几个角色的独角戏\n- ${characters.length > 0 ? '勾选的角色是贴吧的活跃用户，可以发帖，但大部分帖子应该来自贴吧里其他的普通用户' : '没有勾选任何角色，所有发帖用户均自由虚构'}\n- 普通用户的昵称完全自由，不需要刻意贴合贴吧氛围，现实中什么奇怪的昵称都有\n- ${characters.length > 0 ? '勾选角色发帖时内容和风格要符合其persona设定，普通用户内容符合贴吧主题即可' : '内容符合贴吧主题即可，用户本身的风格可以多样'}\n- 所有帖子内容必须紧扣该贴吧的主题和世界观，禁止出现与贴吧无关的内容\n- 帖子之间话题要有差异，角度各有不同，禁止无意义灌水\n- 当前用户昵称是「${userName}」，不要让任何角色主动@用户\n\n【贴吧世界观】\n${board.worldSetting || '（无）'}\n\n【回复风格要求】\n${board.replyStyle || '（无）'}\n\n【当前阶段】\n${stageText || '（无）'}\n\n【世界书】\n${worldBookContent || '（无）'}\n\n【记忆注入】\n${memoryContent || '（无）'}\n\n【近期帖子参考（避免重复）】\n${recentPosts || '（暂无）'}\n\n【参与角色设定】\n${characters.length > 0 ? characters.map(c=>`角色：${c.name}\npersona：${c.persona||'无设定'}`).join('\n\n') : '（无勾选角色，所有发帖用户均自由虚构，昵称和风格符合贴吧氛围即可）'}`;const userPrompt = `请以上述角色身份，在「${board.name}吧」共生成6到10条帖子，话题多样，内容紧扣贴吧主题。\n\n返回格式（JSON数组）：\n[\n  {"type":"post","authorName":"角色名","title":"帖子标题","content":"帖子正文内容","isGood":false,"createTime":1234567890000}\n]\n\n其中 isGood 为 true 表示精品帖，内容要明显比普通帖更丰富、更有深度，每次生成的帖子里精品帖不超过2条。createTime 是 Unix 毫秒时间戳，正常帖子填写当前时间附近的合理值，如果贴吧世界观有时间异常设定（如时间错乱、异常时间戳）则可以填写异常值（如远古时间戳、未来时间戳、负数等）。只返回JSON数组，不要其他任何文字。`;return {systemPrompt, userPrompt};}

// 详情页：给帖子生成回复
async function buildReplyRefreshPrompt(postId) {const post = state.posts.find(p => p.id === postId);if (!post) throw new Error('帖子不存在');const board = state.boards.find(b => b.id === post.boardId);if (!board) throw new Error('贴吧不存在');const characters = board.members && board.members.length > 0 ? await buildCharacterList(board.members) : [];const worldBookContent = await getWorldBookContent();const memoryContent = await getMemoryContent();const identity = getCurrentIdentity();const userName = identity ? identity.nickname || '匿名用户' : '匿名用户';const stageText = board.stages && board.stages.length > 0 ? board.stages[board.currentStage || 0] : '';const existingReplies = state.replies.filter(r => r.postId === postId).map(r=>`第${r.floor}楼 ${r.authorName}：${r.content}`).join('\n');const systemPrompt = `【当前时间】${getCurrentTimeStr()}\n\n【你的任务】\n你是「${board.name}吧」的回复生成器。根据帖子内容和已有回复，生成接下来的20条楼层内容。严格按照JSON格式返回。\n\n【核心规则】\n- 固定生成20条回复，不多不少\n- 楼主（${post.authorName}）是这个帖子的核心叙事者，根据帖子类型自行判断楼主占比：叙事型/连载型帖子楼主占比应该更高，讨论型帖子楼主占比可以低一些\n- 楼主的回复要推进帖子的叙事或回应其他用户，不能只是简单应付\n- 其他回复来自各种不同的用户：勾选角色、贴吧普通用户（自由虚构昵称）\n- 用户昵称完全自由，不需要贴合贴吧氛围，现实中什么昵称都有\n- 回复之间要有真实的互动感：有人追问、有人催更、有人岔开话题、有人吵架\n- 禁止无意义灌水，每条回复都要有实质内容\n- 当前用户昵称是「${userName}」，角色可以偶尔@用户，不要强迫\n\n【贴吧世界观】\n${board.worldSetting || '（无）'}\n\n【回复风格要求】\n${board.replyStyle || '（无）'}\n\n【当前阶段】\n${stageText || '（无）'}\n\n【世界书】\n${worldBookContent || '（无）'}\n\n【记忆注入】\n${memoryContent || '（无）'}\n\n【勾选角色设定】\n${characters.length > 0 ? characters.map(c=>`角色：${c.name}\npersona：${c.persona||'无设定'}`).join('\n\n') : '（无勾选角色，所有回复用户均自由虚构）'}`;const userPrompt = `【帖子信息】\n楼主：${post.authorName}\n标题：${post.title}\n内容：${post.content || '（无正文）'}\n\n【已有回复（全部）】\n${existingReplies || '（暂无回复，这是第一批）'}\n\n请生成接下来的20条回复，楼主要根据帖子类型适当穿插推进叙事。\n\n返回格式（JSON数组，固定20条）：\n[\n  {"type":"reply","authorName":"用户昵称","content":"回复内容","quoteName":"被引用的用户昵称（可选）","quoteContent":"被引用的内容（可选）"}\n]\n\n引用规则：当某条回复是在回应另一条具体楼层时，填写quoteName和quoteContent字段；普通发言不需要填写。只返回JSON数组，不要其他任何文字。`;return {systemPrompt, userPrompt};}

// ===== 执行生成 =====

// 动态页刷新执行
let feedRefreshLocked = false;async function executeFeedRefresh() {if (feedRefreshLocked) return;feedRefreshLocked = true;const btn = document.getElementById('refresh-feed-btn');btn.style.opacity = '0.4';btn.style.pointerEvents = 'none';btn.style.animation = 'spin 1s linear infinite';btn.style.animation = 'spin 1s linear infinite';try {const {systemPrompt, userPrompt} = await buildFeedRefreshPrompt();const raw = await callAPI(systemPrompt, userPrompt);const items = parseAIResponse(raw);let added = 0;for (const item of items) {if (item.type !== 'post' || !item.authorName || !item.title) continue;const board = state.boards.find(b => b.name === item.boardName || b.name === item.boardName?.replace(/吧$/,'') || (b.name+'吧') === item.boardName);if (!board) continue;const characters = await buildCharacterList(board.members);const char = characters.find(c => c.name === item.authorName);const post = {id:'post_'+Date.now()+'_'+Math.random().toString(36).substr(2,5), boardId: board.id, title: item.title, content: item.content || '', authorName: item.authorName, authorAvatar: char?.avatar || DEFAULT_AVATAR, createTime: Date.now() - Math.floor(Math.random()*3600000), replyCount: 0, likeCount: 0};state.posts.push(post);board.postCount = (board.postCount||0)+1;added++;}if (added > 0) {saveToDB();renderFeed();renderHomeBoards();} else {alert('AI未能生成有效帖子，请检查贴吧是否配置了参与角色');}} catch(e) {alert('生成失败：' + e.message);debugLog('ERROR', {message: e.message});} finally {feedRefreshLocked = false;btn.style.opacity = '';btn.style.pointerEvents = '';btn.style.animation = '';}}

// 贴吧页刷新执行
let boardRefreshLocked = false;async function executeBoardRefresh(boardId) {if (boardRefreshLocked) return;boardRefreshLocked = true;const searchBtn = document.getElementById('board-search-btn');if (searchBtn) {searchBtn.style.opacity = '0.4';searchBtn.style.pointerEvents = 'none';}try {const {systemPrompt, userPrompt} = await buildBoardRefreshPrompt(boardId);const raw = await callAPI(systemPrompt, userPrompt);const items = parseAIResponse(raw);const board = state.boards.find(b => b.id === boardId);const characters = await buildCharacterList(board.members);let added = 0;for (const item of items) {if (item.type !== 'post' || !item.authorName || !item.title) continue;const char = characters.find(c => c.name === item.authorName);const post = {id:'post_'+Date.now()+'_'+Math.random().toString(36).substr(2,5), boardId, title: item.title, content: item.content || '', authorName: item.authorName, authorAvatar: char?.avatar || DEFAULT_AVATAR, createTime: item.createTime || (Date.now() - Math.floor(Math.random()*1800000)), replyCount: 0, likeCount: 0, isGood: item.isGood === true};state.posts.push(post);board.postCount = (board.postCount||0)+1;added++;}if (added > 0) {saveToDB();renderBoardPosts();renderHomeBoards();} else {alert('AI未能生成有效帖子');}} catch(e) {alert('生成失败：' + e.message);} finally {boardRefreshLocked = false;if (searchBtn) {searchBtn.style.opacity = '';searchBtn.style.pointerEvents = '';}}}

// 详情页刷新执行
let replyRefreshLocked = false;let hasShownLoadMoreHint = false;async function executeReplyRefresh(postId) {if (replyRefreshLocked) return;replyRefreshLocked = true;const moreBtn = document.getElementById('detail-more-btn');if (moreBtn) {moreBtn.style.pointerEvents = 'none';moreBtn._dotTimer = setInterval(() => {moreBtn.style.color = moreBtn.style.color === 'rgb(58, 142, 230)' ? '#bbb' : '#3a8ee6';}, 400);}try {const {systemPrompt, userPrompt} = await buildReplyRefreshPrompt(postId);const raw = await callAPI(systemPrompt, userPrompt);const items = parseAIResponse(raw);const post = state.posts.find(p => p.id === postId);const board = state.boards.find(b => b.id === post?.boardId);const characters = board && board.members ? await buildCharacterList(board.members) : [];let added = 0;const baseFloor = state.replies.filter(r => r.postId === postId).length + 2;for (const item of items) {if (item.type !== 'reply' || !item.authorName || !item.content) continue;const char = characters.find(c => c.name === item.authorName);const reply = {id:'reply_'+Date.now()+'_'+Math.random().toString(36).substr(2,5), postId, floor: baseFloor + added, content: item.content, authorName: item.authorName, authorAvatar: char?.avatar || DEFAULT_AVATAR, createTime: Date.now() - Math.floor(Math.random()*600000) + added*60000, likeCount: 0, quoteName: item.quoteName || null, quoteContent: item.quoteContent || null, isOp: false};state.replies.push(reply);post.replyCount = (post.replyCount||0)+1;added++;}if (added > 0) {saveToDB();renderReplies(postId);document.getElementById('detail-reply-count').textContent = '回复 ' + state.replies.filter(r=>r.postId===postId).length;setTimeout(() => {const scroll = document.getElementById('detail-scroll');if (scroll) scroll.scrollTop = scroll.scrollHeight;}, 100);} else {alert('AI未能生成有效回复');}} catch(e) {alert('生成失败：' + e.message);} finally {replyRefreshLocked = false;if (moreBtn) {moreBtn.style.pointerEvents = '';moreBtn.style.color = '';if (moreBtn._dotTimer) {clearInterval(moreBtn._dotTimer);moreBtn._dotTimer = null;}}}}

// ===== 调试面板 =====
function debugLog(type, data) {if (type === 'REQUEST') {console.log('========== [贴吧AI] 发送给AI的提示词 ==========');console.log('模型:', data.model);console.log('URL:', data.url);console.log('SystemPrompt内容:\n', data.systemPrompt);console.log('UserPrompt内容:\n', data.userPrompt);console.log('================================================');} else if (type === 'RESPONSE') {console.log('========== [贴吧AI] AI原始回复 ==========');console.log(data.raw);console.log('==========================================');} else if (type === 'ERROR') {console.log('========== [贴吧AI] 错误 ==========');console.log(data.message);console.log('====================================');} else {console.log(`[贴吧AI][${type}]`, data);}}

// ===== 工具函数 =====
function getCurrentIdentity() {if (!state.currentIdentityId) return state.identities[0] || null;return state.identities.find(i => i.id === state.currentIdentityId) || null;}function formatTime(ts) {if (!ts) return '';const d = new Date(ts);const now = new Date();const diff = now - d;if (diff < 60000) return '刚刚';if (diff < 3600000) return Math.floor(diff/60000) + ' 分钟前';if (d.toDateString() === now.toDateString()) return '今天 ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');return (d.getMonth()+1) + '-' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');}

// ===== 读取主文件 IndexedDB =====
async function readGeminiChats() {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('chats')) {resolve([]);return;}const tx = db.transaction('chats','readonly');const store = tx.objectStore('chats');const all = store.getAll();all.onsuccess = () => resolve((all.result||[]).filter(c => !c.isGroup));all.onerror = () => resolve([]);};req.onerror = () => resolve([]);});}async function readPersonaPresets() {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('personaPresets')) {resolve([]);return;}const tx = db.transaction('personaPresets','readonly');const store = tx.objectStore('personaPresets');const all = store.getAll();all.onsuccess = () => resolve(all.result||[]);all.onerror = () => resolve([]);};req.onerror = () => resolve([]);});}async function readSavedApiConfigs() {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('apiConfig')) {resolve([]);return;}const tx = db.transaction('apiConfig','readonly');const store = tx.objectStore('apiConfig');const r = store.get('savedConfigs');r.onsuccess = () => resolve((r.result && r.result.configs) ? r.result.configs : []);r.onerror = () => resolve([]);};req.onerror = () => resolve([]);});}async function readWorldBooks() {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('worldBooks')) {resolve([]);return;}const tx = db.transaction('worldBooks','readonly');const store = tx.objectStore('worldBooks');const all = store.getAll();all.onsuccess = () => resolve(all.result||[]);all.onerror = () => resolve([]);};req.onerror = () => resolve([]);}); }async function readWorldBookFolders() {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('worldBookFolders')) {resolve([]);return;}const tx = db.transaction('worldBookFolders','readonly');const store = tx.objectStore('worldBookFolders');const all = store.getAll();all.onsuccess = () => resolve(all.result||[]);all.onerror = () => resolve([]);};req.onerror = () => resolve([]);});}async function readChatsWithSummary() {return new Promise(resolve => {const req = indexedDB.open('GeminiChatDB', 190);req.onsuccess = e => {const db = e.target.result;if (!db.objectStoreNames.contains('chats')) {resolve([]);return;}const tx = db.transaction('chats','readonly');const store = tx.objectStore('chats');const all = store.getAll();all.onsuccess = () => {const result = (all.result||[]).filter(c => {if (!c.personalSummary) return false;if (c.isGroup) {const exp = c.personalSummary.experiences;return exp && (typeof exp === 'string' ? exp.trim() : Array.isArray(exp) && exp.length > 0);}return c.personalSummary.experiences && c.personalSummary.experiences.trim();});resolve(result);};all.onerror = () => resolve([]);};req.onerror = () => resolve([]);});}

// ===== TiebaDB 本地存储 =====
let tiebaDB = null;async function initTiebaDB() {return new Promise(resolve => {const req = indexedDB.open('TiebaDB', 1);req.onupgradeneeded = e => {const db = e.target.result;if (!db.objectStoreNames.contains('boards')) db.createObjectStore('boards', {keyPath:'id'});if (!db.objectStoreNames.contains('posts')) db.createObjectStore('posts', {keyPath:'id'});if (!db.objectStoreNames.contains('replies')) db.createObjectStore('replies', {keyPath:'id'});if (!db.objectStoreNames.contains('tieba_state')) db.createObjectStore('tieba_state', {keyPath:'id'});};req.onsuccess = e => {tiebaDB = e.target.result;resolve();};req.onerror = () => resolve();});}async function loadFromDB() {if (!tiebaDB) return;const load = (store) => new Promise(r => {const tx = tiebaDB.transaction(store,'readonly');const req = tx.objectStore(store).getAll();req.onsuccess = () => r(req.result||[]);req.onerror = () => r([]);});[state.boards, state.posts, state.replies] = await Promise.all([load('boards'), load('posts'), load('replies')]);const stateRec = await new Promise(r => {const tx = tiebaDB.transaction('tieba_state','readonly');const req = tx.objectStore('tieba_state').get('main');req.onsuccess = () => r(req.result);req.onerror = () => r(null);});if (stateRec) {state.currentIdentityId = stateRec.currentIdentityId || null;state.bio = stateRec.bio || '';state.selectedApiConfigId = stateRec.selectedApiConfigId || null;state.selectedWorldBookIds = stateRec.selectedWorldBookIds || [];state.memoryEntries = stateRec.memoryEntries || [];document.getElementById('mine-bio').textContent = state.bio || '点击设置个性签名';document.getElementById('mine-follow-count').textContent = stateRec.followCount || 0;document.getElementById('mine-fans-count').textContent = stateRec.fansCount || 0;}}function saveToDB() {if (!tiebaDB) return;const save = (storeName, items) => {const tx = tiebaDB.transaction(storeName,'readwrite');const store = tx.objectStore(storeName);items.forEach(item => store.put(item));};save('boards', state.boards);save('posts', state.posts);save('replies', state.replies);try{const tx = tiebaDB.transaction('tieba_state','readwrite');tx.objectStore('tieba_state').put({id:'main', currentIdentityId: state.currentIdentityId, bio: state.bio || '', selectedApiConfigId: state.selectedApiConfigId || null, selectedWorldBookIds: state.selectedWorldBookIds || [], memoryEntries: state.memoryEntries || [], followCount: parseInt(document.getElementById('mine-follow-count').textContent)||0, fansCount: parseInt(document.getElementById('mine-fans-count').textContent)||0});}catch(e){console.warn('saveToDB state error:',e);}}

// ===== 初始化 =====
async function init() {await initTiebaDB();await loadFromDB();PRESET_BOARDS.forEach(preset => {const idx = state.boards.findIndex(b => b.id === preset.id);if (idx === -1) {state.boards.unshift({...preset, badge: Math.floor(Math.random()*9)+1});} else {const old = state.boards[idx];state.boards[idx] = {...preset, badge: old.badge || preset.badge, postCount: old.postCount || 0, members: old.members || [], currentStage: old.currentStage || 0};}});saveToDB();state.identities = await readPersonaPresets();updateMineProfile();updateMineBoardTags();renderHomeBoards();renderFeed();document.getElementById('mine-post-count').textContent = state.posts.length;document.getElementById('mine-follow-count').textContent = state.boards.length;updateMineApiLabel();updateMineWbLabel();updateMineMemoryLabel();}document.getElementById('mine-follow-item').addEventListener('click',()=>{const cur=parseInt(document.getElementById('mine-follow-count').textContent)||0;const val=prompt('设置关注数',cur);if(val===null)return;const num=parseInt(val);if(!isNaN(num)&&num>=0){document.getElementById('mine-follow-count').textContent=num;saveToDB();}});document.getElementById('mine-fans-item').addEventListener('click',()=>{const cur=parseInt(document.getElementById('mine-fans-count').textContent)||0;const val=prompt('设置粉丝数',cur);if(val===null)return;const num=parseInt(val);if(!isNaN(num)&&num>=0){document.getElementById('mine-fans-count').textContent=num;saveToDB();}});init();
</script>
