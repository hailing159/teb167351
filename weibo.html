<style>

n-items:center;gap:10px;margin-bottom:8px;}.comment-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#ddd;flex-shrink:0;}.comment-name{font-size:14px;font-weight:600;color:#333;}.comment-author-tag{background:#ff8200;color:#fff;font-size:10px;border-radius:3px;padding:1px 4px;margin-left:4px;}.comment-content{font-size:14px;color:#333;line-height:1.6;margin-bottom:8px;}.comment-quote{background:#f7f7f7;border-radius:4px;padding:8px 10px;margin-bottom:8px;font-size:13px;color:#666;}.comment-quote-name{color:#ff8200;font-weight:600;}.comment-footer{display:flex;align-items:center;justify-content:space-between;}.comment-meta{font-size:12px;color:#bbb;}.comment-like-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-size:12px;color:#bbb;}.comment-like-btn.liked{color:#ff8200;}.detail-bottom-bar{display:flex;align-items:center;padding:8px 12px;background:#fff;border-top:1px solid #eee;flex-shrink:0;gap:10px;}.detail-comment-input{flex:1;background:#f5f5f5;border:none;border-radius:20px;padding:8px 14px;font-size:14px;color:#333;cursor:pointer;text-align:left;}.detail-bottom-actions{display:flex;gap:14px;}.detail-bottom-btn{background:none;border:none;cursor:pointer;color:#666;font-size:20px;}

/* ===== 发微博页 ===== */

#comment-drawer{position:fixed;inset:0;z-index:300;display:none;}#comment-drawer.open{display:block;}.comment-drawer-mask{position:absolute;inset:0;background:rgba(0,0,0,0.4);}.comment-drawer-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:14px 16px 30px;transform:translateY(100%);transition:transform 0.3s ease;}#comment-drawer.open .comment-drawer-panel{transform:translateY(0);}.comment-drawer-row{display:flex;align-items:center;gap:10px;}.comment-drawer-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}.comment-drawer-input{flex:1;background:#f5f5f5;border:none;border-radius:8px;padding:10px 12px;font-size:15px;color:#333;outline:none;font-family:inherit;min-height:44px;resize:none;}.comment-drawer-tools{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;}.comment-drawer-tool-left{display:flex;gap:16px;}.comment-drawer-tool-btn{background:none;border:none;cursor:pointer;color:#999;font-size:20px;}.comment-drawer-send{background:#ff8200;color:#fff;border:none;border-radius:20px;padding:7px 20px;font-size:14px;font-weight:600;cursor:pointer;}

<body>
<div id="app">

<!-- ===== 动态 Tab ===== -->
<div class="tab-page active" id="tab-feed"><div class="feed-header"><img class="feed-header-avatar" id="feed-header-avatar" src="" onerror="this.src=''" alt="" onclick="openIdentitySheet()"><div class="feed-header-tabs"><span class="feed-header-tab active" data-feedtab="follow">关注</span><span class="feed-header-tab" data-feedtab="recommend">推荐</span></div><button class="feed-header-search" id="feed-refresh-btn" onclick="executeFeedRefresh()"><i class="fa-solid fa-magnifying-glass"></i></button></div><div class="wb-scroll" id="feed-scroll"><div id="feed-list"></div></div><button class="wb-fab" id="new-post-btn"><i class="fa-solid fa-plus"></i></button></div>

<!-- ===== 我的 Tab ===== -->
<div class="tab-page" id="tab-mine"><div class="mine-header"><button style="background:none;border:none;cursor:pointer;padding:4px;" onclick="if(window.parent&&window.parent!==window)window.parent.postMessage({type:'close-weibo'},'*');"><svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 15V6H15" stroke="#333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 42H6V33" stroke="#333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M42 33V42H33" stroke="#333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M33 6H42V15" stroke="#333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 24H38" stroke="#333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></button><span class="mine-header-title">我的</span><button style="background:none;border:none;cursor:pointer;color:#999;font-size:18px;padding:4px;"><i class="fa-solid fa-magnifying-glass"></i></button></div><div class="wb-scroll"><div class="mine-profile" id="mine-profile-row" onclick="openIdentitySheet()"><img class="mine-avatar" id="mine-avatar" src="" onerror="this.src=''" alt=""><div class="mine-info"><div class="mine-name" id="mine-name">未设置身份 <i class="fa-solid fa-chevron-right"></i></div><div class="mine-sub"><img src="https://file.garden/aWUAmU2JTHlXI-j0/91d2069e-5e50-4517-b2ff-dacb265f7bd4.png" style="height:25px;object-fit:contain;vertical-align:middle;"><span id="mine-fans">0粉丝</span></div></div></div><div class="mine-menu"><div class="mine-menu-item" id="mine-characters-btn"><div class="mine-menu-icon" style="background:#fce4ec;color:#e91e63;"><i class="fa-solid fa-users"></i></div><span class="mine-menu-label">互动角色</span><i class="mine-menu-arrow fa-solid fa-chevron-right"></i></div><div class="mine-menu-item" id="mine-api-btn"><div class="mine-menu-icon" style="background:#e8f0fe;color:#4a9ee6;"><i class="fa-solid fa-key"></i></div><span class="mine-menu-label">API 配置</span><i class="mine-menu-arrow fa-solid fa-chevron-right"></i></div><div class="mine-menu-item" id="mine-wb-btn"><div class="mine-menu-icon" style="background:#fff0e6;color:#ff8200;"><i class="fa-solid fa-book-open"></i></div><span class="mine-menu-label">世界书选择</span><i class="mine-menu-arrow fa-solid fa-chevron-right"></i></div><div class="mine-menu-item" id="mine-mem-btn"><div class="mine-menu-icon" style="background:#e6fff0;color:#00b050;"><i class="fa-solid fa-gear"></i></div><span class="mine-menu-label">记忆总结注入</span><i class="mine-menu-arrow fa-solid fa-chevron-right"></i></div></div></div></div>

<script>
const DEFAULT_AVATAR = 'https://file.garden/aGe4CU9X_j-yMpiG/o-o-1.jpg';

const WB_COLOR = '#ff8200';

const state = {currentTab:'tab-feed', currentFeedTab:'follow', currentMsgTab:'dm', currentPostId:null, currentIdentityId:null, identities:[], posts:[], comments:[], hotSearches:[], messages:[], selectedApiConfigId:null, selectedWorldBookIds:[], memoryEntries:[], selectedCharacterIds:[]};

// ===== Tab切换 =====
document.querySelectorAll('.wb-tab-item').forEach(item => {item.addEventListener('click', () => {const tab = item.dataset.tab;switchTab(tab);});});function switchTab(tab) {state.currentTab = tab;document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));document.getElementById(tab).classList.add('active');document.querySelectorAll('.wb-tab-item').forEach(i => i.classList.toggle('active', i.dataset.tab === tab));const fab = document.getElementById('new-post-btn');if (fab) fab.style.display = tab === 'tab-feed' ? 'flex' : 'none';}

// ===== 动态页子Tab =====
document.querySelectorAll('.feed-header-tab').forEach(tab => {tab.addEventListener('click', () => {state.currentFeedTab = tab.dataset.feedtab;document.querySelectorAll('.feed-header-tab').forEach(t => t.classList.remove('active'));tab.classList.add('active');renderFeed();});});

// ===== 私信页子Tab =====
document.querySelectorAll('.msg-tab').forEach(tab => {tab.addEventListener('click', () => {state.currentMsgTab = tab.dataset.msgtab;document.querySelectorAll('.msg-tab').forEach(t => t.classList.remove('active'));tab.classList.add('active');renderMessages();});});

// ===== 详情页 =====
function openPostDetail(postId) {state.currentPostId = postId;const post = state.posts.find(p => p.id === postId);if (!post) return;document.getElementById('detail-header-avatar').src = post.authorAvatar || DEFAULT_AVATAR;document.getElementById('detail-header-name').textContent = post.authorName;document.getElementById('detail-author-meta').textContent = formatTime(post.createTime) + (post.source ? ' · ' + post.source : '');document.getElementById('detail-post-text').textContent = post.content;document.getElementById('detail-bottom-avatar').src = getCurrentIdentityAvatar();document.getElementById('post-detail-page').classList.add('open');renderComments(postId);}function closePostDetail() {document.getElementById('post-detail-page').classList.remove('open');state.currentPostId = null;}document.getElementById('detail-back-btn').addEventListener('click', closePostDetail);

// ===== 评论抽屉 =====
function openCommentDrawer(targetComment) {replyToComment = targetComment || null;document.getElementById('comment-drawer-avatar').src = getCurrentIdentityAvatar();const input = document.getElementById('comment-drawer-input');input.value = '';input.placeholder = targetComment ? `回复 ${targetComment.authorName}：` : '同时转发';document.getElementById('comment-drawer').classList.add('open');setTimeout(() => input.focus(), 300);}function closeCommentDrawer() {document.getElementById('comment-drawer').classList.remove('open');}document.getElementById('open-comment-drawer-btn').addEventListener('click', openCommentDrawer);document.getElementById('detail-comment-btn').addEventListener('click', openCommentDrawer);document.getElementById('comment-drawer-mask').addEventListener('click', closeCommentDrawer);document.getElementById('comment-drawer-send').addEventListener('click', submitComment);let replyToComment = null;function submitComment() {const text = document.getElementById('comment-drawer-input').value.trim();if (!text) return;const identity = getCurrentIdentity();const comment = {id:'comment_'+Date.now(), postId:state.currentPostId, content:text, authorName:identity?identity.nickname||'匿名':'匿名', authorAvatar:identity?identity.avatar||DEFAULT_AVATAR:DEFAULT_AVATAR, createTime:Date.now(), likeCount:0, replyToId:replyToComment?replyToComment.id:null, replyToName:replyToComment?replyToComment.authorName:null, replyToContent:replyToComment?replyToComment.content:null};state.comments.push(comment);const post = state.posts.find(p => p.id === state.currentPostId);if (post) post.commentCount = (post.commentCount||0)+1;replyToComment = null;closeCommentDrawer();renderComments(state.currentPostId);saveToDB();}

function renderComments(postId) {const list = document.getElementById('detail-comments-list');const comments = state.comments.filter(c => c.postId === postId);list.innerHTML = '';if (comments.length === 0) {list.innerHTML = '<div style="text-align:center;padding:30px;color:#bbb;font-size:14px;">暂无评论</div>';return;}const topComments = comments.filter(c => !c.replyToId).sort((a,b) => commentSortMode === 'hot' ? (b.likeCount||0)-(a.likeCount||0) : b.createTime-a.createTime);topComments.forEach(c => {const post = state.posts.find(p => p.id === postId);const isAuthor = post && c.authorName === post.authorName;const replies = comments.filter(r => r.replyToId === c.id);const item = document.createElement('div');item.className = 'comment-item';const quoteHtml = c.replyToName ? `<div style="background:#f7f7f7;border-radius:4px;padding:8px 10px;margin-bottom:8px;font-size:13px;color:#666;"><span style="color:#ff8200;font-weight:600;">${c.replyToName}：</span>${c.replyToContent||''}</div>` : '';const repliesHtml = replies.length > 0 ? `<div style="background:#f7f7f7;border-radius:6px;padding:8px 10px;margin-top:6px;">${replies.map(r=>`<div class="reply-in-comment" data-reply-id="${r.id}" style="margin-bottom:${replies.indexOf(r)<replies.length-1?'2px':'0'};cursor:pointer;"><span style="color:#4a9ee6;font-weight:600;font-size:13px;">${r.authorName}：</span><span style="font-size:13px;color:#333;">${r.content}</span></div>`).join('')}</div>` : '';const commentSelectHtml = commentManageMode ? `<div style="position:absolute;top:10px;right:12px;width:22px;height:22px;border-radius:50%;border:2px solid ${selectedComments.has(c.id)?'#ff3b30':'#ddd'};background:${selectedComments.has(c.id)?'#ff3b30':'#fff'};display:flex;align-items:center;justify-content:center;z-index:2;">${selectedComments.has(c.id)?'<i class="fa-solid fa-check" style="color:#fff;font-size:10px;"></i>':''}</div>` : '';item.style.position = 'relative';item.innerHTML = `${commentSelectHtml}<div class="comment-header"><div style="position:relative;flex-shrink:0;"><img class="comment-avatar" src="${c.authorAvatar||DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" alt=""><img src="https://file.garden/aWUAmU2JTHlXI-j0/IMG-5988.png" style="position:absolute;bottom:2px;right:0;width:12px;height:12px;border-radius:50%;"></div><span class="comment-name">${c.authorName}${isAuthor?'<span class="comment-author-tag">博主</span>':''}</span></div>${quoteHtml}<div class="comment-content" style="cursor:pointer;">${c.content}</div>${repliesHtml}<div class="comment-footer"><span class="comment-meta">${formatTime(c.createTime)}</span><button class="comment-like-btn"><i class="fa-regular fa-thumbs-up"></i> ${c.likeCount||0}</button></div>`;item.querySelector('.comment-content').addEventListener('click', () => {if (commentManageMode) return;openCommentDrawer(c);});item.addEventListener('click', () => {if (!commentManageMode) return;if (selectedComments.has(c.id)) selectedComments.delete(c.id); else selectedComments.add(c.id);document.getElementById('comment-selected-count').textContent = `已选 ${selectedComments.size} 条`;renderComments(state.currentPostId);});let commentLongTimer;item.addEventListener('touchstart', () => {commentLongTimer = setTimeout(() => {if (!commentManageMode) showCommentActionSheet(c.id);}, 600);}, {passive:true});item.addEventListener('touchend', () => clearTimeout(commentLongTimer), {passive:true});item.addEventListener('touchmove', () => clearTimeout(commentLongTimer), {passive:true});item.querySelectorAll('.reply-in-comment').forEach(el => {const replyId = el.dataset.replyId;const replyObj = replies.find(r => r.id === replyId);if (replyObj) el.addEventListener('click', e => {e.stopPropagation();openCommentDrawer({id: c.id, authorName: replyObj.authorName, content: replyObj.content});});});item.querySelector('.comment-like-btn').addEventListener('click', e => {c.likeCount = (c.likeCount||0)+1;e.currentTarget.innerHTML = `<i class="fa-solid fa-thumbs-up"></i> ${c.likeCount}` function formatContent(text) {if (!text) return '';return text.replace(/#([^#]+)#/g,'<span class="topic">#$1#</span>').replace(/@(\S+)/g,'<span class="mention">@$1</span>');}function formatTime(ts) {if (!ts) return '';const d = new Date(ts);const now = new Date();const diff = now - d;if (diff < 60000) return '刚刚';if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';if (d.toDateString()===now.toDateString()) return '今天 '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');return (d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}function getCurrentIdentity() {if (!state.currentIdentityId) return state.identities[0]||null;return state.identities.find(i => i.id === state.currentIdentityId)||null;}function getCurrentIdentityAvatar() {const i = getCurrentIdentity();return i?i.avatar||DEFAULT_AVATAR:DEFAULT_AVATAR;}

let tempWbSelected = new Set();document.getElementById('mine-wb-btn').addEventListener('click', openWbModal2);document.getElementById('wb-modal-cancel').addEventListener('click', () => closeWbModal('wb-modal'));document.getElementById('wb-modal-mask').addEventListener('click', () => closeWbModal('wb-modal'));document.getElementById('wb-modal-confirm').addEventListener('click', () => {state.selectedWorldBookIds=[...tempWbSelected];closeWbModal('wb-modal');saveToDB();updateWbLabel();});document.getElementById('wb-select-all').addEventListener('click', () => {document.querySelectorAll('#wb-book-list input').forEach(cb=>{cb.checked=true;tempWbSelected.add(cb.value);});document.getElementById('wb-selected-count').textContent=tempWbSelected.size;});document.getElementById('wb-clear-all').addEventListener('click', () => {document.querySelectorAll('#wb-book-list input').forEach(cb=>{cb.checked=false;});tempWbSelected.clear();document.getElementById('wb-selected-count').textContent=0;});async function readWorldBookFolders(){return new Promise(resolve=>{const req=indexedDB.open('GeminiChatDB',190);req.onsuccess=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('worldBookFolders')){resolve([]);return;}const tx=db.transaction('worldBookFolders','readonly');const all=tx.objectStore('worldBookFolders').getAll();all.onsuccess=()=>resolve(all.result||[]);all.onerror=()=>resolve([]);};req.onerror=()=>resolve([]);});}async function openWbModal2(){tempWbSelected=new Set(state.selectedWorldBookIds);const [books,folders]=await Promise.all([readWorldBooks(),readWorldBookFolders()]);const list=document.getElementById('wb-book-list');const empty=document.getElementById('wb-book-empty');list.innerHTML='';if(books.length===0){list.style.display='none';empty.style.display='block';}else{list.style.display='block';empty.style.display='none';const ungrouped=books.filter(b=>!b.folderId||b.folderId==='ungrouped');const renderBook=(wb,indent=false)=>{const item=document.createElement('label');item.style.cssText=`display:flex;align-items:center;gap:12px;padding:12px ${indent?'32px':'16px'} 12px ${indent?'32px':'16px'};border-bottom:1px solid #f7f7f7;cursor:pointer;background:#fff;`;const checked=tempWbSelected.has(wb.id);item.innerHTML=`<input type="checkbox" value="${wb.id}" ${checked?'checked':''} style="width:18px;height:18px;accent-color:${WB_COLOR};flex-shrink:0;"><div style="flex:1;min-width:0;"><div style="font-size:14px;color:#333;">${wb.name}</div><div style="font-size:12px;color:#bbb;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(wb.content||'').substring(0,30)||'暂无内容'}</div></div>`;item.querySelector('input').addEventListener('change',e=>{if(e.target.checked)tempWbSelected.add(wb.id);else tempWbSelected.delete(wb.id);document.getElementById('wb-selected-count').textContent=tempWbSelected.size;});return item;};folders.forEach(folder=>{const folderBooks=books.filter(b=>b.folderId===folder.id);if(folderBooks.length===0)return;const folderEl=document.createElement('div');const allChecked=folderBooks.every(b=>tempWbSelected.has(b.id));const someChecked=folderBooks.some(b=>tempWbSelected.has(b.id));folderEl.style.cssText='background:#f7f7f7;border-bottom:1px solid #eee;';folderEl.innerHTML=`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;"><input type="checkbox" class="folder-cb" style="width:18px;height:18px;accent-color:${WB_COLOR};flex-shrink:0;" ${allChecked?'checked':''}><span style="font-size:14px;font-weight:600;color:#333;flex:1;">${folder.name}</span><span style="font-size:12px;color:#999;">${folderBooks.length}本</span><i class="fa-solid fa-chevron-down folder-arrow" style="color:#bbb;font-size:12px;transition:transform 0.2s;"></i></div>`;const cb=folderEl.querySelector('.folder-cb');if(someChecked&&!allChecked)cb.indeterminate=true;const booksContainer=document.createElement('div');booksContainer.style.display='none';folderBooks.forEach(wb=>booksContainer.appendChild(renderBook(wb,true)));folderEl.querySelector('div').addEventListener('click',e=>{if(e.target===cb||e.target.tagName==='INPUT')return;const isOpen=booksContainer.style.display!=='none';booksContainer.style.display=isOpen?'none':'block';folderEl.querySelector('.folder-arrow').style.transform=isOpen?'':'rotate(180deg)';});cb.addEventListener('change',()=>{folderBooks.forEach(wb=>{if(cb.checked)tempWbSelected.add(wb.id);else tempWbSelected.delete(wb.id);booksContainer.querySelectorAll('input[type=checkbox]').forEach(i=>i.checked=cb.checked);});document.getElementById('wb-selected-count').textContent=tempWbSelected.size;});list.appendChild(folderEl);list.appendChild(booksContainer);});if(ungrouped.length>0){const groupHeader=document.createElement('div');groupHeader.style.cssText='background:#f7f7f7;border-bottom:1px solid #eee;padding:10px 16px;font-size:13px;color:#999;font-weight:600;';groupHeader.textContent='未分组';list.appendChild(groupHeader);ungrouped.forEach(wb=>list.appendChild(renderBook(wb,false)));}}document.getElementById('wb-selected-count').textContent=tempWbSelected.size;openWbModal('wb-modal');}function updateWbLabel() {const label=document.querySelector('#mine-wb-btn .mine-menu-label');if(label)label.textContent=state.selectedWorldBookIds.length>0?`世界书选择 (${state.selectedWorldBookIds.length})`:'世界书选择';}

async function getPollinationsKey(){return new Promise(resolve=>{const req=indexedDB.open('GeminiChatDB',190);req.onsuccess=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('globalSettings')){resolve('');return;}const tx=db.transaction('globalSettings','readonly');const r=tx.objectStore('globalSettings').get('main');r.onsuccess=()=>resolve(r.result?.pollinationsKey||'');r.onerror=()=>resolve('');};req.onerror=()=>resolve('');});}async function generateImage(prompt){const key=await getPollinationsKey();if(!key)return null;try{const url=`https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?model=flux&key=${key}&seed=${Math.floor(Math.random()*999999)}`;const resp=await fetch(url);if(!resp.ok)return null;const blob=await resp.blob();return new Promise(r=>{const reader=new FileReader();reader.onloadend=()=>r(reader.result);reader.readAsDataURL(blob);});}catch(e){return null;}}

function wbLog(type,data){if(type==='REQUEST'){const fn=(m,...a)=>{console.log(m,...a);try{window.parent.console.log(m,...a);}catch(e){}};fn('========== [微博AI] 发送给AI的提示词 ==========');fn('模型:',data.model);fn('--- SystemPrompt ---');data.systemPrompt.split('\n').forEach(l=>fn(l));fn('--- UserPrompt ---');data.userPrompt.split('\n').forEach(l=>fn(l));fn('================================================');}else if(type==='RESPONSE'){console.log('========== [微博AI] AI回复 ==========');console.log(data.raw);console.log('==========================================');}else if(type==='ERROR'){console.log('========== [微博AI] 错误 ==========',data.message);}}

// ===== API调用核心 =====
async function callWeiboAPI(systemPrompt,userPrompt){const configs=await readSavedApiConfigs();let cfg=configs.find(c=>c.id===state.selectedApiConfigId);if(!cfg&&configs.length>0)cfg=configs[0];if(!cfg)throw new Error('未配置API，请先在「我的」页面选择API配置');const apiKey=cfg.apiKey||cfg.config1?.apiKey||cfg.key||'';const model=cfg.model||cfg.config1?.model||'gemini-1.5-flash';const baseUrl=cfg.proxyUrl||cfg.baseUrl||cfg.config1?.proxyUrl||cfg.config1?.baseUrl||'https://generativelanguage.googleapis.com';if(!apiKey)throw new Error('API Key 为空');const url=`${baseUrl}/v1beta/models/${model}:generateContent?key=${apiKey}`;const body={contents:[{role:'user',parts:[{text:userPrompt}]}],systemInstruction:{parts:[{text:systemPrompt}]},generationConfig:{temperature:0.9,maxOutputTokens:4096}};wbLog('REQUEST',{systemPrompt,userPrompt,model,url:url.replace(apiKey,'***')});const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!resp.ok){const err=await resp.text();throw new Error(`API错误 ${resp.status}: ${err}`);}const data=await resp.json();const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';wbLog('RESPONSE',{raw:text});return text;}function parseWeiboResponse(text){try{const clean=text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();return JSON.parse(clean);}catch(e){const match=text.match(/\[[\s\S]*\]/);if(match)try{return JSON.parse(match[0]);}catch(e2){}throw new Error('解析失败：'+text.substring(0,100));}}function getTimeStr(){const n=new Date();return `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;}

async function getWbWorldBookContent(){if(!state.selectedWorldBookIds||state.selectedWorldBookIds.length===0)return'';const books=await readWorldBooks();const selected=books.filter(b=>state.selectedWorldBookIds.includes(b.id));return selected.map(b=>`【世界书·${b.name}】\n${b.content||''}`).join('\n\n');}async function getWbMemoryContent(){if(!state.memoryEntries||state.memoryEntries.length===0)return'';const req=indexedDB.open('GeminiChatDB',190);const chats=await new Promise(r=>{req.onsuccess=e=>{const db=e.target.result;const tx=db.transaction('chats','readonly');const all=tx.objectStore('chats').getAll();all.onsuccess=()=>r(all.result||[]);all.onerror=()=>r([]);};req.onerror=()=>r([]);});let result='';for(const entry of state.memoryEntries){const chat=chats.find(c=>c.id===entry.chatId);if(!chat||!chat.personalSummary)continue;const s=chat.personalSummary;const parts=[];if(s.preferences)parts.push('偏好：'+s.preferences);if(s.experiences){const exp=Array.isArray(s.experiences)?s.experiences.join('\n'):s.experiences;if(exp.trim())parts.push('经历：'+exp);}if(s.opinion)parts.push('看法：'+s.opinion);if(!parts.length)continue;let full=parts.join('\n');full=full.substring(0,Math.floor(full.length*(entry.percent/100)));result+=`【${chat.name}的记忆】\n${full}\n\n`;}return result.trim();}async function getWbCharacters(){const contacts=await readGeminiContacts();return contacts.filter(c=>state.selectedCharacterIds&&state.selectedCharacterIds.includes(c.id));}

eplyToName:item.replyToName||null,replyToContent:item.replyToContent||null});}post.commentCount=(post.commentCount||0)+items.length;saveToDB();renderComments(state.currentPostId);}catch(e){alert('生成失败：'+e.message);}finally{commentRefreshLocked=false;if(btn){btn.style.pointerEvents='';btn.style.color='';if(btn._timer){clearInterval(btn._timer);btn._timer=null;}}}}

let msgRefreshLocked=false;async function executeMsgRefresh(){if(msgRefreshLocked)return;msgRefreshLocked=true;const btn=document.getElementById('msg-refresh-btn');if(btn){btn.style.opacity='0.4';btn.style.pointerEvents='none';}try{const identity=getCurrentIdentity();const userName=identity?identity.nickname||'匿名用户':'匿名用户';const userPersona=identity?identity.persona||'':'';const worldBook=await getWbWorldBookContent();const systemPrompt=`【当前时间】${getTimeStr()}\n\n【当前情况说明】\n你是一个微博私信生成器，根据用户人设生成陌生人发来的私信。\n\n【规则要求】\n- 生成1到3条私信\n- 私信发送者是陌生人：粉丝、推销、搭讪、合作邀约等类型\n- 私信内容要符合世界观设定\n- 发送者名字自由虚构，符合世界观\n\n【用户信息】\n用户昵称：${userName}\n用户人设：${userPersona||'（无）'}\n\n【世界书】\n${worldBook||'（无）'}`;const userPrompt=`请生成1到3条陌生人发来的私信。\n\n返回格式（JSON数组）：\n[\n  {"name":"发送者昵称","preview":"第一条消息内容","firstMessage":"完整的第一条消息","senderPersona":"发送者身份简介","time":"2小时前"}\n]\n\n只返回JSON数组。`;const raw=await callWeiboAPI(systemPrompt,userPrompt);const items=parseWeiboResponse(raw);items.forEach((item,idx)=>{if(!item.name||!item.preview)return;const msg={id:'msg_'+Date.now()+'_'+idx,name:item.name,avatar:DEFAULT_AVATAR,preview:item.preview,firstMessage:item.firstMessage||item.preview,senderPersona:item.senderPersona||'',time:item.time||'刚刚',isAI:true};state.messages.push(msg);if(!dmChats[msg.id])dmChats[msg.id]=[{id:'dm_init_'+msg.id,content:item.firstMessage||item.preview,isMe:false,createTime:Date.now()}];});saveToDB();renderMessages();}catch(e){alert('生成失败：'+e.message);}finally{msgRefreshLocked=false;if(btn){btn.style.opacity='';btn.style.pointerEvents='';}}}

// ===== 6. 私信聊天页AI回复 =====
let dmReplyLocked=false;async function executeDmReply(){if(dmReplyLocked)return;const msgId=document.getElementById('dm-chat-page').dataset.msgId;const msg=state.messages.find(m=>m.id===msgId);if(!msg)return;dmReplyLocked=true;const emojiBtn=document.querySelector('#dm-chat-page button:has(.fa-face-smile)');if(emojiBtn){emojiBtn.style.opacity='0.4';emojiBtn.style.pointerEvents='none';}try{const identity=getCurrentIdentity();const userName=identity?identity.nickname||'匿名用户':'匿名用户';const userPersona=identity?identity.persona||'':'';const worldBook=await getWbWorldBookContent();const memory=await getWbMemoryContent();const history=dmChats[msgId]||[];const historyText=history.map(h=>`${h.isMe?userName:msg.name}：${h.content}`).join('\n');const systemPrompt=`【当前时间】${getTimeStr()}\n\n【当前情况说明】\n你正在扮演微博私信中的「${msg.name}」，与用户「${userName}」进行私信对话。\n\n【角色信息】\n角色名：${msg.name}\n角色身份：${msg.senderPersona||'微博用户'}\n\n【规则要求】\n- 以「${msg.name}」的身份回复1到3条消息\n- 消息短小自然，像真实私信\n- 根据对话历史保持连贯性\n- 用户人设：${userPersona||'（无）'}\n\n【世界书】\n${worldBook||'（无）'}\n\n【记忆注入】\n${memory||'（无）'}`;const userPrompt=`【对话历史】\n${historyText||'（暂无）'}\n\n请以「${msg.name}」的身份回复1到3条私信消息。\n\n返回格式（JSON数组）：\n[\n  {"content":"消息内容"}\n]\n\n只返回JSON数组。`;const raw=await callWeiboAPI(systemPrompt,userPrompt);const items=parseWeiboResponse(raw);items.forEach(item=>{if(!item.content)return;if(!dmChats[msgId])dmChats[msgId]=[];dmChats[msgId].push({id:'dm_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),content:item.content,isMe:false,createTime:Date.now()});});const lastMsg=items[items.length-1];if(lastMsg){const m=state.messages.find(m=>m.id===msgId);if(m)m.preview=lastMsg.content;}saveToDB();renderDmChat(msgId);}catch(e){alert('生成失败：'+e.message);}finally{dmReplyLocked=false;if(emojiBtn){emojiBtn.style.opacity='';emojiBtn.style.pointerEvents='';}}}
